<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="نَحْرِير - مساعد شخصي ذكي للمعلمين وصنّاع المحتوى. سبورة رقمية، تقويم، قرآن كريم، مواقيت صلاة، وأدوات إنتاجية.">
  <meta name="author" content="محمد علاء (Mohamed Alaa)">
  <title>نَحْرِير - Nahrir | مساعد شخصي ذكي</title>
  <link rel="icon" type="image/x-icon" href="/icon.ico">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; overflow: hidden; }

    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.3s ease-out;
    }
    #splash-screen.hidden { opacity: 0; pointer-events: none; }

    .splash-logo {
      width: 120px; height: 120px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 24px; display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: bold; color: white;
      box-shadow: 0 20px 60px rgba(102,126,234,0.3); margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .splash-text { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .splash-subtitle { font-size: 16px; color: rgba(255,255,255,0.7); }
    .spinner {
      width: 40px; height: 40px; margin-top: 24px;
      border: 4px solid rgba(255,255,255,0.1); border-top-color: #667eea;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="splash-screen">
    <div class="splash-logo">ن</div>
    <div class="splash-text">نَحْرِير</div>
    <div class="splash-subtitle">مساعد شخصي ذكي</div>
    <div class="spinner"></div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/app/main.jsx"></script>
</body>

</html>
